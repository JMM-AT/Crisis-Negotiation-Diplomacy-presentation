<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crisis Negotiation & Diplomacy Bureau — 3D Models</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#02060f}
#c{display:block;position:fixed;inset:0;z-index:0}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none}

/* ── LOADING SCREEN ── */
#loading{
  position:fixed;inset:0;z-index:100;
  background:#02060f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s;
}
#loading h2{
  font-family:'Cinzel',serif;font-size:1.1em;letter-spacing:.22em;
  color:#c9a050;text-transform:uppercase;margin-bottom:28px;
}
#loading-bar-wrap{
  width:260px;height:3px;background:rgba(201,160,80,.15);border-radius:2px;margin-bottom:14px;
}
#loading-bar{
  height:100%;width:0%;background:#c9a050;border-radius:2px;transition:width .3s;
}
#loading-status{
  font-family:'Cinzel',serif;font-size:.55em;letter-spacing:.18em;
  color:rgba(201,160,80,.4);text-transform:uppercase;
}
#loading-animals{
  display:flex;gap:14px;margin-top:22px;
}
.la-item{
  text-align:center;
  font-size:.55em;
  letter-spacing:.1em;
  font-family:'Cinzel',serif;
  text-transform:uppercase;
  transition:color .3s;
  color:rgba(201,160,80,.25);
}
.la-item.done{color:#c9a050;}
.la-item .la-icon{font-size:1.6em;display:block;margin-bottom:4px;filter:grayscale(1) opacity(.3);transition:filter .3s;}
.la-item.done .la-icon{filter:grayscale(0) opacity(1);}

/* ── TOP BAR ── */
#topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;
  background:linear-gradient(180deg,rgba(2,6,15,.9) 0%,transparent 100%);
}
#bureau-logo{font-family:'Cinzel',serif;font-size:.85em;letter-spacing:.22em;color:#c9a050;text-transform:uppercase;font-weight:600;}
#slide-info{font-family:'Cinzel',serif;font-size:.65em;letter-spacing:.18em;color:rgba(201,160,80,.45);}

/* ── PANEL ── */
#panel{
  position:absolute;right:0;top:0;bottom:0;width:360px;
  background:linear-gradient(270deg,rgba(2,6,15,.97) 55%,transparent 100%);
  display:flex;flex-direction:column;justify-content:center;
  padding:80px 30px 80px 55px;
  opacity:0;transition:opacity .5s;pointer-events:all;overflow-y:auto;
}
#panel.show{opacity:1}
#panel h2{font-family:'Cinzel',serif;font-size:1.5em;font-weight:700;color:#c9a050;letter-spacing:.08em;line-height:1.15;margin-bottom:6px;}
#panel .role{font-family:'Cinzel',serif;font-size:.55em;letter-spacing:.2em;color:#4a9f7a;border:1px solid rgba(74,159,122,.4);display:inline-block;padding:3px 10px;margin-bottom:18px;text-transform:uppercase;}
#panel .bar{width:36px;height:2px;background:#c9a050;margin-bottom:18px}
#panel p{font-family:'Crimson Pro',serif;font-size:.95em;line-height:1.75;color:rgba(230,215,185,.82);font-weight:300;margin-bottom:14px;}
#panel .pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
#panel .pill{font-family:'Crimson Pro',serif;font-size:.75em;background:rgba(74,120,165,.15);border:1px solid rgba(74,120,165,.4);color:#88bdd8;padding:3px 10px;border-radius:20px;}
#panel .label{font-family:'Cinzel',serif;font-size:.5em;letter-spacing:.18em;color:rgba(201,160,80,.6);text-transform:uppercase;margin-bottom:6px;display:block;}

/* ── MEMBERS LEFT ── */
#members{
  position:absolute;left:0;top:0;bottom:0;width:220px;
  background:linear-gradient(90deg,rgba(2,6,15,.95) 60%,transparent 100%);
  display:flex;flex-direction:column;justify-content:center;
  padding:80px 36px 80px 18px;
  opacity:0;transition:opacity .5s;pointer-events:all;
}
#members.show{opacity:1}
#members h3{font-family:'Cinzel',serif;font-size:.6em;letter-spacing:.2em;color:rgba(201,160,80,.5);text-transform:uppercase;margin-bottom:14px;}
.mbtn{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:4px;cursor:pointer;transition:all .2s;margin-bottom:3px;border:1px solid transparent;}
.mbtn:hover{background:rgba(201,160,80,.07);border-color:rgba(201,160,80,.18)}
.mbtn.act{background:rgba(201,160,80,.1);border-color:rgba(201,160,80,.35)}
.mbtn .mico{font-size:1.3em}
.mbtn .mname{font-family:'Cinzel',serif;font-size:.6em;color:#c9a050;letter-spacing:.07em;text-transform:uppercase;}
.mbtn .mrole{font-family:'Crimson Pro',serif;font-size:.65em;color:rgba(230,215,185,.4);margin-top:1px;}

/* ── TITLE ── */
#title-over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .6s;}
#title-over h1{font-family:'Cinzel',serif;font-size:3em;font-weight:700;color:#c9a050;letter-spacing:.1em;line-height:1.1;text-shadow:0 0 60px rgba(201,160,80,.35);}
#title-over .sub{font-family:'Crimson Pro',serif;font-size:1.05em;color:rgba(230,215,185,.45);letter-spacing:.18em;margin-top:12px;text-transform:uppercase;}
#title-over .tag{font-family:'Crimson Pro',serif;font-size:.9em;font-style:italic;color:rgba(201,160,80,.5);margin-top:18px;}

/* ── TOOLTIP ── */
#tip{position:fixed;background:rgba(2,6,15,.92);border:1px solid rgba(201,160,80,.45);border-radius:5px;padding:7px 14px;font-family:'Cinzel',serif;font-size:.65em;color:#c9a050;letter-spacing:.1em;pointer-events:none;display:none;z-index:50;white-space:nowrap;}

/* ── NAV ── */
#bottom{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:center;padding:0 32px 26px;background:linear-gradient(0deg,rgba(2,6,15,.85) 0%,transparent 100%);pointer-events:all;}
#dots{display:flex;gap:8px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(201,160,80,.2);border:1px solid rgba(201,160,80,.35);cursor:pointer;transition:all .3s;}
.dot.on{background:#c9a050;box-shadow:0 0 8px rgba(201,160,80,.7);transform:scale(1.4)}
.dot:hover{background:rgba(201,160,80,.5)}
#arrows{position:absolute;bottom:20px;right:32px;display:flex;gap:8px;pointer-events:all;}
.arr-btn{width:38px;height:38px;border-radius:50%;border:1px solid rgba(201,160,80,.35);background:rgba(2,6,15,.7);color:#c9a050;font-size:1em;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.arr-btn:hover{background:rgba(201,160,80,.15);border-color:#c9a050;box-shadow:0 0 14px rgba(201,160,80,.3)}

/* ── SPIN HINT ── */
#drag-hint{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:.5em;letter-spacing:.18em;color:rgba(201,160,80,.3);text-transform:uppercase;pointer-events:none;transition:opacity 1s;}

/* Table, cards etc */
.wtable{width:100%;border-collapse:collapse;margin-top:8px;font-family:'Crimson Pro',serif}
.wtable th{font-family:'Cinzel',serif;font-size:.5em;letter-spacing:.12em;color:#c9a050;padding:5px 6px;border-bottom:1px solid rgba(201,160,80,.25);text-align:left;font-weight:400}
.wtable td{padding:6px 6px;font-size:.78em;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(230,215,185,.8);line-height:1.4;vertical-align:top}
.wtable .rd{color:#e07070}.wtable .gn{color:#7ec8a0}
.hcard{border-radius:6px;padding:14px;margin-bottom:10px}
.hy{background:rgba(74,154,122,.07);border:1px solid rgba(74,154,122,.3)}
.hn{background:rgba(224,112,112,.07);border:1px solid rgba(224,112,112,.3)}
.hcard .ht{font-family:'Cinzel',serif;font-size:.52em;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px}
.hy .ht{color:#7ec8a0}.hn .ht{color:#e07070}
.hcard .hn2{font-family:'Cinzel',serif;font-size:.75em;color:#c9a050;letter-spacing:.07em;margin-bottom:5px}
.hcard .hd{font-family:'Crimson Pro',serif;font-size:.82em;color:rgba(230,215,185,.75);line-height:1.5}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.vcard{background:rgba(201,160,80,.06);border:1px solid rgba(201,160,80,.18);border-radius:6px;padding:12px;text-align:center}
.vcard .vi{font-size:1.5em;display:block;margin-bottom:5px}
.vcard .vl{font-family:'Cinzel',serif;font-size:.52em;color:#c9a050;letter-spacing:.12em}

/* ── EXPANSION GRID ── */
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.exp-card{border-radius:6px;padding:11px 12px;border:1px solid rgba(201,160,80,.15);background:rgba(201,160,80,.04)}
.exp-card .ec-tag{font-family:'Cinzel',serif;font-size:.44em;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px;display:block}
.exp-card .ec-name{font-family:'Cinzel',serif;font-size:.62em;color:#c9a050;letter-spacing:.07em;margin-bottom:3px}
.exp-card .ec-desc{font-family:'Crimson Pro',serif;font-size:.72em;color:rgba(230,215,185,.6);line-height:1.4}
.phase-badge{display:inline-block;font-family:'Cinzel',serif;font-size:.44em;letter-spacing:.14em;text-transform:uppercase;padding:2px 8px;border-radius:10px;margin-bottom:8px}
.phase-1{background:rgba(74,159,122,.15);border:1px solid rgba(74,159,122,.35);color:#4a9f7a}
.phase-2{background:rgba(74,120,200,.15);border:1px solid rgba(74,120,200,.35);color:#4a88d8}
.phase-3{background:rgba(160,80,200,.15);border:1px solid rgba(160,80,200,.35);color:#b060e0}
.stat-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.stat-row:last-child{border-bottom:none}
.stat-icon{font-size:1.1em;flex-shrink:0;width:22px;text-align:center}
.stat-label{font-family:'Cinzel',serif;font-size:.5em;letter-spacing:.12em;color:rgba(201,160,80,.6);text-transform:uppercase;min-width:70px}
.stat-val{font-family:'Crimson Pro',serif;font-size:.8em;color:rgba(230,215,185,.85)}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <h2>Loading 3D Models</h2>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">Initialising scene…</div>
  <div id="loading-animals">
    <div class="la-item" id="la-dolphin"><span class="la-icon">🐬</span>Dolphin</div>
    <div class="la-item" id="la-owl"><span class="la-icon">🦉</span>Owl</div>
    <div class="la-item" id="la-elephant"><span class="la-icon">🐘</span>Elephant</div>
    <div class="la-item" id="la-crow"><span class="la-icon">🐦</span>Crow</div>
    <div class="la-item" id="la-octopus"><span class="la-icon">🐙</span>Octopus</div>
    <div class="la-item" id="la-eagle"><span class="la-icon">🦅</span>Eagle</div>
    <div class="la-item" id="la-bee"><span class="la-icon">🐝</span>Bee</div>
  </div>
</div>

<canvas id="c"></canvas>
<div id="ui">
  <div id="topbar">
    <div id="bureau-logo">Crisis Negotiation &amp; Diplomacy Bureau</div>
    <div id="slide-info">01 / 17</div>

  </div>
  <div id="title-over">
    <h1>Crisis Negotiation<br>&amp; Diplomacy<br>Bureau</h1>
    <div class="sub">Specialist Animal Task Force</div>
    <div class="tag">"De-escalate · Negotiate · Resolve"</div>
  </div>
  <div id="members"><h3>The Team</h3><div id="mlist"></div></div>
  <div id="panel"><div id="pcontent"></div></div>
  <div id="tip"></div>
  <div id="drag-hint">Drag to rotate · Scroll to zoom</div>
  <div id="bottom"><div id="dots"></div></div>
  <div id="arrows">
    <button class="arr-btn" id="bprev">&#8592;</button>
    <button class="arr-btn" id="bnext">&#8594;</button>
  </div>
</div>

<!-- Three.js r128 + GLTFLoader + OrbitControls via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ═══════════════════════════════════════════════
// TEAM DATA
// ═══════════════════════════════════════════════
const TEAM = [
  { id:'dolphin', emoji:'🐬', name:'Dolphin',   role:'Lead Negotiator',
    file:'dolphin.glb',  scale:3.5,  col:0x1a8fbf,
    strengths:['Advanced communication','Emotional intelligence','Social bonding'],
    mission:'Leads all hostage negotiations. Reads emotional cues in real time, builds trust with opposing parties, and maintains calm under extreme pressure.',
    why:'Dolphins use complex communication systems and deep empathy — essential for crisis de-escalation.' },
  { id:'owl',     emoji:'🦉', name:'Owl',       role:'Intelligence Analyst',
    file:'owl.glb',      scale:4.5,  col:0x8a6030,
    strengths:['Silent observation','Night vision','Exceptional hearing'],
    mission:'Gathers intelligence without alerting suspects. Monitors from concealed positions and ensures the team always acts on precise information.',
    why:'Owls are built for quiet, accurate observation — the backbone of any successful crisis response.' },
  { id:'elephant',emoji:'🐘', name:'Elephant',  role:'Operations Coordinator',
    file:'elephant.glb', scale:3.0,  col:0x708090,
    strengths:['Exceptional memory','Empathy','Stability under chaos'],
    mission:'Tracks long-term strategy and past case patterns. Guides ethical decisions and keeps the team grounded during chaotic situations.',
    why:'Elephants never forget — pattern recognition and emotional steadiness save lives in the field.' },
  { id:'crow',    emoji:'🐦', name:'Crow',      role:'Problem Solver',
    file:'crow.glb',     scale:2.5,  col:0x2a2a50,
    strengths:['High intelligence','Tool use','Creative improvisation'],
    mission:'Solves unexpected crises in real time. Designs creative solutions when standard protocols fail and rapid innovation is critical.',
    why:'Crows are proven multi-step tool-users under pressure — among the smartest animals on Earth.' },
  { id:'octopus', emoji:'🐙', name:'Octopus',   role:'Infiltration Specialist',
    file:'octopus.glb',  scale:1.1,  col:0x7a1a60,
    strengths:['Camouflage mastery','Extreme flexibility','8-arm multitasking'],
    mission:'Handles all stealth operations — infiltrating tight spaces, evading detection, executing high-risk rescues nobody else can reach.',
    why:'No animal matches the octopus for disguise and physical adaptability in hostile environments.' },
  { id:'eagle',   emoji:'🦅', name:'Eagle',     role:'Surveillance Leader',
    file:'eagle.glb',    scale:4.0,  col:0xb07020,
    strengths:['Long-distance vision','Aerial speed','360° field of view'],
    mission:'Monitors from above, providing real-time aerial intelligence. Detects approaching threats before they escalate.',
    why:'Eagles see 5× farther than humans — the ultimate early-warning system for any field operation.' },
  { id:'bee',     emoji:'🐝', name:'Honeybee',  role:'Logistics Coordinator',
    file:'honeybee.glb', scale:1.4,  col:0xd4a020,
    strengths:['Precision teamwork','Waggle-dance comms','Operational efficiency'],
    mission:'Manages all communication systems and coordinates resources. Ensures every team member gets the right intel at the right moment.',
    why:'Honeybees run nature\'s most efficient organizations — perfect for coordinating a high-pressure bureau.' },
];

// ── Model positions in the scene circle ──
const POSITIONS = [
  [ 0,   0,  4],  // dolphin — center front
  [-12,  0,  4],  // owl — far left
  [ 12,  0,  4],  // elephant — far right
  [-7,   2, -4],  // crow — raised, mid left back
  [ 7,   0, -4],  // octopus — mid right back
  [ 0,   3, -10], // eagle — raised high, far back center
  [ 0,   0,  12], // bee — far front
];

// ═══════════════════════════════════════════════
// SLIDES — now 17 total (added 'expansion')
// ═══════════════════════════════════════════════
const SLIDES = [
  {t:'title'},{t:'team'},
  ...TEAM.map((_,i)=>({t:'animal',i})),
  {t:'hiring'},{t:'workspace'},{t:'weaknesses'},{t:'future'},{t:'expansion'},{t:'conclusion'}
];

// ═══════════════════════════════════════════════
// ENGINE VARS
// ═══════════════════════════════════════════════
let slide=0, scene, cam, renderer, clock;
let controls, raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2();
let animalGroups=[], building, skybox, nebulaLayers=[], shootingStars=[];
let hovered=null;
let camTarget={x:0,y:2,z:18}, camLook={x:0,y:0,z:0};
let loadedCount=0, totalModels=TEAM.length;
let fallbackMeshes={};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.3;
  renderer.outputEncoding=THREE.sRGBEncoding;

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x02060f, 0.025);

  cam = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 300);
  cam.position.set(0,4,26);

  controls = new THREE.OrbitControls(cam, renderer.domElement);
  controls.enableDamping=true;
  controls.dampingFactor=0.06;
  controls.minDistance=6;
  controls.maxDistance=55;
  controls.maxPolarAngle=Math.PI*.65;
  controls.target.set(0,1,0);
  controls.autoRotate=true;
  controls.autoRotateSpeed=0.4;

  clock = new THREE.Clock();

  addLights();
  makeSkybox();
  makeParticles();
  makeBuilding();
  loadAllModels();

  addEventListener('resize', onResize);
  renderer.domElement.addEventListener('mousemove', onMove);
  renderer.domElement.addEventListener('click', onClick);

  loop();
}

// ═══════════════════════════════════════════════
// LIGHTS
// ═══════════════════════════════════════════════
function addLights(){
  scene.add(new THREE.AmbientLight(0x1a2535, 1.0));

  const sun = new THREE.DirectionalLight(0xffd090, 2.0);
  sun.position.set(15,25,10);
  sun.castShadow=true;
  sun.shadow.mapSize.width=sun.shadow.mapSize.height=2048;
  sun.shadow.camera.near=1; sun.shadow.camera.far=100;
  sun.shadow.camera.left=sun.shadow.camera.bottom=-30;
  sun.shadow.camera.right=sun.shadow.camera.top=30;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0x4060a0, .7);
  fill.position.set(-12, 8, -8);
  scene.add(fill);

  const gold = new THREE.PointLight(0xc9a050, 2, 40);
  gold.position.set(0, 8, 3);
  scene.add(gold);
}

// ═══════════════════════════════════════════════
// LOAD ALL GLB MODELS
// ═══════════════════════════════════════════════
function loadAllModels(){
  const loader = new THREE.GLTFLoader();
  setStatus('Loading models from /models/ …');

  TEAM.forEach((member, i)=>{
    const grp = new THREE.Group();
    grp.position.set(...POSITIONS[i]);
    grp.userData = { isAnimal:true, idx:i, phase:Math.random()*Math.PI*2, baseY:POSITIONS[i][1] };
    scene.add(grp);
    animalGroups.push(grp);

    loader.load(
      `models/${member.file}`,
      (gltf) => {
        const model = gltf.scene;
        grp.add(model);
        model.updateMatrixWorld(true);

        const box = new THREE.Box3();
        model.traverse(ch => {
          if(ch.isMesh && ch.geometry){
            ch.updateWorldMatrix(true, false);
            const meshBox = new THREE.Box3().setFromBufferAttribute(ch.geometry.attributes.position);
            meshBox.applyMatrix4(ch.matrixWorld);
            box.union(meshBox);
          }
        });

        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const desiredSize = 2.2 * member.scale;

        if(maxDim > 0.0001){
          const s = desiredSize / maxDim;
          model.scale.setScalar(s);
          model.position.set(0, 0, 0);
          model.updateMatrixWorld(true);

          const box2 = new THREE.Box3();
          model.traverse(ch => {
            if(ch.isMesh && ch.geometry){
              ch.updateWorldMatrix(true, false);
              const mb = new THREE.Box3().setFromBufferAttribute(ch.geometry.attributes.position);
              mb.applyMatrix4(ch.matrixWorld);
              box2.union(mb);
            }
          });

          const modelHeight = box2.max.y - box2.min.y;
          model.position.y = -box2.min.y + 0.05;
          if(model.position.y > modelHeight + 1) model.position.y = modelHeight * 0.5;
          if(model.position.y < 0) model.position.y = 0.1;
        } else {
          model.scale.setScalar(desiredSize * 0.5);
          model.position.y = 0.5;
        }

        model.traverse(ch=>{
          if(ch.isMesh){
            ch.castShadow=true;
            ch.receiveShadow=true;
            const mats = Array.isArray(ch.material) ? ch.material : [ch.material];
            mats.forEach(m=>{ if(m){ m.envMapIntensity=0.8; m.needsUpdate=true; } });
          }
        });

        grp.userData.model = model;

        if(member.id === 'dolphin'){ model.rotation.z = Math.PI * 0.15; model.rotation.y = Math.PI * 0.3; }
        if(member.id === 'eagle'){ model.rotation.y = Math.PI; }
        if(member.id === 'crow'){ model.rotation.y = Math.PI * 0.8; }

        if(gltf.animations && gltf.animations.length > 0){
          const mixer = new THREE.AnimationMixer(model);
          mixer.clipAction(gltf.animations[0]).play();
          grp.userData.mixer = mixer;
        }

        onModelLoaded(member.id);
      },
      null,
      (error) => {
        console.warn(`[${member.id}] GLB load failed — using fallback`, error);
        const fallback = makeFallback(member);
        grp.add(fallback);
        grp.userData.model = fallback;
        onModelLoaded(member.id);
      }
    );

    const platMat = new THREE.MeshPhongMaterial({color:0x0d1828,emissive:0x0a1835,emissiveIntensity:.5,transparent:true,opacity:.85});
    const plat = new THREE.Mesh(new THREE.CylinderGeometry(1.6,1.8,0.18,24), platMat);
    plat.position.y=-1.6; plat.receiveShadow=true;
    grp.add(plat);

    const halo = new THREE.Mesh(
      new THREE.TorusGeometry(1.9,.045,8,50),
      new THREE.MeshBasicMaterial({color:member.col, transparent:true, opacity:.4})
    );
    halo.rotation.x=Math.PI/2; halo.position.y=-1.5;
    grp.add(halo);
    grp.userData.halo = halo;

    const pl = new THREE.PointLight(member.col, 1.5, 9);
    pl.position.y=0.5;
    grp.add(pl);
    grp.userData.light = pl;
  });
}

function onModelLoaded(id){
  loadedCount++;
  document.getElementById(`la-${id}`)?.classList.add('done');
  const pct = Math.round((loadedCount/totalModels)*100);
  document.getElementById('loading-bar').style.width = pct+'%';
  setStatus(`Loaded ${loadedCount} / ${totalModels} models…`);

  if(loadedCount >= totalModels){
    setStatus('All models ready!');
    setTimeout(()=>{
      const ls = document.getElementById('loading');
      ls.style.opacity='0';
      setTimeout(()=>ls.style.display='none', 800);
      buildDots();
      go(0);
    }, 600);
  }
}

function setStatus(txt){ document.getElementById('loading-status').textContent=txt; }

function makeFallback(member){
  const geos = {
    dolphin: new THREE.SphereGeometry(.9,16,12),
    owl:     new THREE.ConeGeometry(.7,1.6,8),
    elephant:new THREE.BoxGeometry(1.4,1.2,1.2),
    crow:    new THREE.OctahedronGeometry(.9,1),
    octopus: new THREE.TorusGeometry(.7,.3,12,24),
    eagle:   new THREE.OctahedronGeometry(1.0,0),
    bee:     new THREE.DodecahedronGeometry(.85,0),
  };
  const geo = geos[member.id] || new THREE.SphereGeometry(.9,12,10);
  const mat = new THREE.MeshPhongMaterial({
    color:member.col, emissive:member.col, emissiveIntensity:.3,
    shininess:80, specular:0x444444, wireframe:false
  });
  const mesh = new THREE.Mesh(geo,mat);
  mesh.castShadow=true;
  const wf = new THREE.Mesh(geo.clone(), new THREE.MeshBasicMaterial({color:member.col,wireframe:true,opacity:.18,transparent:true}));
  wf.scale.setScalar(1.06);
  const g = new THREE.Group();
  g.add(mesh); g.add(wf);
  g.position.y=0.3;
  return g;
}

    const g=ctx.createLinearGradient(0,y-100,0,y+100);

  });

  ctx.save();ctx.translate(1024,512);ctx.rotate(-.28);

  }

    for(let side=0;side<4;side++){
      for(let col2=-1;col2<=1;col2++){
        const ang=side*Math.PI*.5;
        const ww=new THREE.Mesh(new THREE.PlaneGeometry(.75,.95),
          new THREE.MeshBasicMaterial({color:wCols[Math.floor(Math.random()*4)],transparent:true,opacity:.6}));
        const dist=4.06,y=3+floor*3.6;
        ww.position.set(Math.sin(ang)*dist+col2*.9*Math.cos(ang),y,Math.cos(ang)*dist-col2*.9*Math.sin(ang));
        ww.rotation.y=ang;ww.userData.wp=Math.random()*Math.PI*2;
        building.add(ww);
      }
    }
  }

  const zones=[
    {id:'eagle', label:'Observation Deck', pos:[0,27.5,0], color:0xffcc44, animal:'🦅'},
    {id:'owl',   label:'Analysis Rooms',   pos:[-8.5,2,0],  color:0x4466ff, animal:'🦉'},
    {id:'cmd',   label:'Command Hub',      pos:[8.5,2,0],   color:0xffaa00, animal:'🐝🐦'},
    {id:'pool',  label:'Aquatic Zone',     pos:[0,1,10],    color:0x00aaff, animal:'🐬🐙'},
    {id:'tunnel',label:'Tunnel Network',   pos:[-5,1,-10],  color:0xaa00ff, animal:'🐙'},
    {id:'halls', label:'Reinforced Halls', pos:[-13,1,0],   color:0x8899aa, animal:'🐘'},
  ];

  zones.forEach(z=>{
    const ringGeo=new THREE.TorusGeometry(1.4,.06,8,32);
    const ringMat=new THREE.MeshBasicMaterial({color:z.color,transparent:true,opacity:.7});
    const ring=new THREE.Mesh(ringGeo,ringMat);
    ring.rotation.x=Math.PI/2;
    ring.position.set(z.pos[0],z.pos[1]+.1,z.pos[2]);
    ring.userData.zoneId=z.id;ring.userData.zoneData=z;ring.userData.isZoneMarker=true;
    ring.userData.baseOpacity=.7;
    building.add(ring);
    zoneMarkers.push(ring);

    const discGeo=new THREE.CircleGeometry(1.3,32);
    const discMat=new THREE.MeshBasicMaterial({color:z.color,transparent:true,opacity:.08,side:THREE.DoubleSide});
    const disc=new THREE.Mesh(discGeo,discMat);
    disc.rotation.x=-Math.PI/2;
    disc.position.set(z.pos[0],z.pos[1]+.12,z.pos[2]);
    disc.userData.isDisc=true;disc.userData.discColor=z.color;
    building.add(disc);

    const sph=new THREE.Mesh(new THREE.SphereGeometry(.18,10,10),
      new THREE.MeshBasicMaterial({color:z.color}));
    sph.position.set(z.pos[0],z.pos[1]+.8,z.pos[2]);
    sph.userData.labelSphere=true;sph.userData.zoneData=z;sph.userData.zoneId=z.id;
    building.add(sph);
  });

  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(120,80),new THREE.MeshPhongMaterial({color:0x050b14,shininess:5}));
  gnd.rotation.x=-Math.PI/2;gnd.position.y=-.55;gnd.receiveShadow=true;building.add(gnd);
  building.add(new THREE.GridHelper(80,40,0x0d1828,0x081018));

  scene.add(building);
}

// ═══════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════
function loop(){
  requestAnimationFrame(loop);
  const t=clock.getElapsedTime();

  controls.update();

  animalGroups.forEach((a,i)=>{
    const ph=a.userData.phase;
    a.position.y=a.userData.baseY + Math.sin(t*.7+ph)*.3;

    if(a.userData.mixer) a.userData.mixer.update(0.016);

    if(!controls.isDragging && a.userData.model){
      a.userData.model.rotation.y+=.005;
    }

    if(a.userData.halo) a.userData.halo.scale.setScalar(.92+Math.sin(t*2+ph)*.08);

    const sl=SLIDES[slide];
    const isActive=sl.t==='animal'&&sl.i===i;
    const isHov=hovered===a;
    const tl=isActive||isHov?3.5:1.5;
    if(a.userData.light) a.userData.light.intensity+=(tl-a.userData.light.intensity)*.08;
    const ts=isActive?1.4:isHov?1.15:1.0;
    a.scale.lerp(new THREE.Vector3(ts,ts,ts),.07);
  });

  if(building) building.children.forEach(ch=>{
    if(ch.userData.wp!==undefined) ch.material.opacity=.15+Math.abs(Math.sin(t*.9+ch.userData.wp))*.55;
    if(ch.userData.spin) ch.rotation.y+=.012;
    if(ch.userData.beam){ch.material.opacity=.04+Math.abs(Math.sin(t*.5))*.1;ch.rotation.y+=.012;}
    if(ch.userData.poolLight) ch.intensity=1.2+Math.sin(t*2.5)*.4;
    if(ch.userData.bubbleIdx!==undefined){
      ch.position.y+=ch.userData.bubbleSpeed*.01;
      ch.material.opacity=.4+Math.sin(t*2+ch.userData.bubbleIdx)*.2;
      if(ch.position.y>3.5) ch.position.y=1.2;
    }
    if(ch.userData.isZoneMarker){
      const isActive=activeZone===ch.userData.zoneId;
      ch.material.opacity=isActive?.9:.4+Math.sin(t*2+ch.userData.zoneId?.length||0)*.3;
      const sc=isActive?1.15:.95+Math.sin(t*1.8)*.05;
      ch.scale.setScalar(sc);
    }
    if(ch.userData.isDisc){
      ch.material.opacity=.05+Math.abs(Math.sin(t*1.5))*.08;
    }
    if(ch.userData.labelSphere){
      ch.position.y+=Math.sin(t*2+ch.userData.zoneId?.length||0)*.005;
    }
  });

  if(skybox) skybox.rotation.y+=.00008;
  nebulaLayers.forEach(nl=>{nl.rotation.z+=nl.userData.rotSpeed;nl.lookAt(cam.position);});

  shootingStars.forEach(ss=>{
    if(!ss.active){ss.delay-=.016;if(ss.delay<=0)ss.active=true;return;}
    ss.life++;
    const prog=ss.life/ss.maxLife;
    const op=prog<.2?prog/.2:prog>.7?(1-prog)/.3:1;
    ss.mesh.geometry.setFromPoints([new THREE.Vector3(ss.x+ss.vx*ss.life,ss.y+ss.vy*ss.life,ss.z),new THREE.Vector3(ss.x+ss.vx*(ss.life-14),ss.y+ss.vy*(ss.life-14),ss.z)]);
    ss.mesh.geometry.computeBoundingSphere();
    ss.mesh.material.opacity=op*.85;
    if(ss.life>=ss.maxLife){ss.x=(Math.random()-.5)*120;ss.y=15+Math.random()*30;ss.z=-70+Math.random()*20;ss.vx=(Math.random()>.5?1:-1)*(.4+Math.random()*.5);ss.vy=-.12-Math.random()*.12;ss.maxLife=60+Math.random()*50;ss.life=0;ss.delay=6+Math.random()*18;ss.active=false;ss.mesh.material.opacity=0;}
  });

  renderer.render(scene,cam);
}

// ═══════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════
function onMove(e){
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,cam);
  const tip=document.getElementById('tip');

  const meshes=[];
  animalGroups.forEach(a=>a.traverse(ch=>{if(ch.isMesh)meshes.push(ch);}));
  const hits=raycaster.intersectObjects(meshes,false);
  if(hits.length){
    let obj=hits[0].object;
    while(obj.parent&&!obj.parent.userData?.isAnimal)obj=obj.parent;
    if(obj.parent?.userData?.isAnimal){
      hovered=obj.parent;
      document.body.style.cursor='pointer';
      const m=TEAM[obj.parent.userData.idx];
      tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px';
      tip.style.top=(e.clientY-8)+'px';
      tip.textContent=m.name+' — '+m.role;
      return;
    }
  }

  if(SLIDES[slide].t==='workspace' && building.visible){
    const zoneMeshes=[];
    building.traverse(ch=>{if(ch.userData.isZoneMarker||ch.userData.labelSphere)zoneMeshes.push(ch);});
    const zhits=raycaster.intersectObjects(zoneMeshes,false);
    if(zhits.length){
      const zd=zhits[0].object.userData.zoneData;
      if(zd){
        hovered=null;
        document.body.style.cursor='pointer';
        const info=ZONE_INFO[zd.id];
        tip.style.display='block';
        tip.style.left=(e.clientX+14)+'px';
        tip.style.top=(e.clientY-8)+'px';
        tip.textContent=(info?info.title:zd.label)+' — click to inspect';
        return;
      }
    }
  }

  hovered=null;document.body.style.cursor='default';tip.style.display='none';
}

function onClick(){
  if(hovered){ go(2+hovered.userData.idx); return; }
  if(SLIDES[slide].t==='workspace' && building.visible){
    raycaster.setFromCamera(mouse,cam);
    const zoneMeshes=[];
    building.traverse(ch=>{ if(ch.userData.isZoneMarker||ch.userData.labelSphere) zoneMeshes.push(ch); });
    const hits=raycaster.intersectObjects(zoneMeshes,false);
    if(hits.length){
      const zd=hits[0].object.userData.zoneData;
      if(zd) showZoneInfo(zd);
    }
  }
}

function onResize(){
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

// ═══════════════════════════════════════════════
// SLIDES
// ═══════════════════════════════════════════════
function go(idx){
  slide=Math.max(0,Math.min(SLIDES.length-1,idx));
  renderSlide();
  updateDots();
  document.getElementById('slide-info').textContent=String(slide+1).padStart(2,'0')+' / '+String(SLIDES.length).padStart(2,'0');
}

function renderSlide(){
  const sl=SLIDES[slide];
  const panel=document.getElementById('panel');
  const members=document.getElementById('members');
  const titleOver=document.getElementById('title-over');

  panel.classList.remove('show');members.classList.remove('show');
  titleOver.style.opacity='0';titleOver.style.pointerEvents='none';
  animalGroups.forEach(a=>a.visible=true);
  building.visible=true;

  if(sl.t==='title'){
    controls.target.set(0,1,0);controls.minDistance=10;controls.maxDistance=40;
    titleOver.style.opacity='1';building.position.set(0,-5,-14);
  }
  else if(sl.t==='team'){
    controls.target.set(0,0,0);building.visible=false;
    setTimeout(()=>{members.classList.add('show');buildMList();},100);
    showPanel(teamHTML());
  }
  else if(sl.t==='animal'){
    const a=animalGroups[sl.i];
    controls.target.lerp(new THREE.Vector3(a.position.x,a.position.y,a.position.z),.5);
    controls.minDistance=3;controls.maxDistance=12;
    building.visible=false;
    showPanel(animalHTML(TEAM[sl.i]));
    buildMList(sl.i);
    setTimeout(()=>members.classList.add('show'),100);
  }
  else if(sl.t==='hiring'){
    controls.target.set(0,1,0);controls.minDistance=8;controls.maxDistance=30;
    building.visible=false;showPanel(hiringHTML());
  }
  else if(sl.t==='workspace'){
    animalGroups.forEach(a=>a.visible=false);
    building.visible=true;
    building.position.set(0,-5,-3);
    controls.target.set(0,8,0);
    controls.minDistance=8;controls.maxDistance=50;
    controls.autoRotate=true;controls.autoRotateSpeed=0.3;
    showPanel(workspaceHTML());
    activeZone=null;
  }
  else if(sl.t==='weaknesses'){controls.target.set(0,1,0);building.visible=false;showPanel(weaknessHTML());}
  else if(sl.t==='future'){controls.target.set(0,1,0);building.visible=false;showPanel(futureHTML());}
  else if(sl.t==='expansion'){
    controls.target.set(0,2,0);controls.minDistance=12;controls.maxDistance=45;
    building.visible=false;showPanel(expansionHTML());
  }
  else if(sl.t==='conclusion'){
    controls.target.set(0,2,0);controls.minDistance=12;controls.maxDistance=40;
    building.visible=true;building.position.set(0,-5,-14);showPanel(conclusionHTML());
  }
}

function showPanel(html){
  document.getElementById('pcontent').innerHTML=html;
  setTimeout(()=>document.getElementById('panel').classList.add('show'),80);
}

function focusZone(zoneId){

// NAV HELPERS
// ═══════════════════════════════════════════════
function buildDots(){document.getElementById('dots').innerHTML=SLIDES.map((_,i)=>`<div class="dot${i===0?' on':''}" onclick="go(${i})"></div>`).join('');}
function updateDots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===slide));}

document.getElementById('bnext').onclick=()=>go(slide+1);
document.getElementById('bprev').onclick=()=>go(slide-1);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')go(slide+1);if(e.key==='ArrowLeft')go(slide-1);});
let tx=null;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{if(tx===null)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?go(slide+1):go(slide-1);}tx=null;});
addEventListener('resize',onResize);

init();
</script>
